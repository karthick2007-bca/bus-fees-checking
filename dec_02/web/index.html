  <script>
    // Load Razorpay dynamically to avoid blocking
    function loadRazorpay(callback) {
      if (window.Razorpay) { callback(); return; }
      var script = document.createElement('script');
      script.src = 'https://checkout.razorpay.com/v1/checkout.js';
      script.onload = callback;
      script.onerror = function() { console.error('Razorpay failed to load'); };
      document.head.appendChild(script);
    }

    function openRazorpay(options) {
      loadRazorpay(function() {
        options.handler = function(response) {
          if (typeof _dartPaymentSuccess === 'function') {
            _dartPaymentSuccess(
              response.razorpay_payment_id || '',
              response.razorpay_order_id || '',
              response.razorpay_signature || ''
            );
          }
        };
        options.modal = {
          ondismiss: function() {
            if (typeof _dartPaymentDismiss === 'function') {
              _dartPaymentDismiss();
            }
          }
        };
        var rzp = new Razorpay(options);
        rzp.open();
      });
    }
  </script>
